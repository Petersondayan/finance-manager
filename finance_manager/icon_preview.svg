<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background rounded square -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3c5e"/>
      <stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4dd0e1"/>
      <stop offset="100%" style="stop-color:#0097a7"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#26c6da"/>
      <stop offset="100%" style="stop-color:#00838f"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="100%" style="stop-color:#0097a7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="44" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="36" y1="80"  x2="220" y2="80"  stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="36" y1="120" x2="220" y2="120" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="36" y1="160" x2="220" y2="160" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Bar 1 (short) -->
  <rect x="44" y="155" width="44" height="55" rx="6" fill="url(#bar1)" opacity="0.85"/>

  <!-- Bar 2 (medium) -->
  <rect x="106" y="110" width="44" height="100" rx="6" fill="url(#bar2)" opacity="0.9"/>

  <!-- Bar 3 (tall) -->
  <rect x="168" y="68" width="44" height="142" rx="6" fill="url(#bar3)"/>

  <!-- Trend line -->
  <polyline
    points="66,148  128,103  190,61"
    stroke="#ffd54f"
    stroke-width="5"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Trend line dot markers -->
  <circle cx="66"  cy="148" r="5" fill="#ffd54f"/>
  <circle cx="128" cy="103" r="5" fill="#ffd54f"/>
  <circle cx="190" cy="61"  r="5" fill="#ffd54f"/>

  <!-- Dollar sign badge (bottom-left circle) -->
  <circle cx="58" cy="198" r="26" fill="#ffd54f"/>
  <text x="58" y="207" font-family="Arial Black, Arial, sans-serif" font-size="28" font-weight="900"
        fill="#0d2137" text-anchor="middle">$</text>
</svg>
